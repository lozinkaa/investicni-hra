<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investiční simulace</title>
<style>
body { font-family: Arial; background:#f4f6fb; text-align:center; padding:20px; }
.card { background:white; padding:20px; border-radius:16px; max-width:750px; margin:auto; box-shadow:0 10px 30px rgba(0,0,0,0.1);} 
button { margin:6px; padding:10px; border:none; border-radius:10px; cursor:pointer; }
#log { margin-top:15px; text-align:left; }
#pendingBox { margin-top:10px; text-align:left; font-size:14px; }
</style>
</head>
<body>

<div class="card">
<h1>💰 Investiční simulace</h1>
<input id="name" placeholder="Jméno">
<button onclick="start()">Start</button>

<div id="game" style="display:none">
<p>💸 Peníze: <b><span id="money">10000</span></b></p>
<p>📅 Rok: <b><span id="year">1</span></b>/5</p>

<div id="buttons">
<button onclick="invest('safe')">🏦 Spoření</button>
<button onclick="invest('stocks')">📈 Akcie</button>
<button onclick="invest('real')">🏠 Nemovitosti</button>
<button onclick="invest('crypto')">🪙 Krypto</button>
<button onclick="invest('business')">🚀 Podnikání</button>
<button onclick="invest('bonds')">📜 Dluhopisy</button>
</div>

<div id="log"></div>
<div id="pendingBox"></div>
</div>

<h2>🏆 Leaderboard</h2>
<table id="leader"></table>
</div>

<script>
let money, year, player;
let pending = [];

function start(){
  player = document.getElementById("name").value || "Hráč";
  money = 10000;
  year = 1;
  pending = [];
  document.getElementById("game").style.display = "block";
  document.getElementById("buttons").style.display = "block";
  update();
  renderPending();
}

function randomEvent(){
  let events = [
    {name:"📉 Recese", desc:"Ekonomika zpomaluje"},
    {name:"📈 Boom", desc:"Ekonomika roste"},
    {name:"💸 Inflace", desc:"Peníze ztrácí hodnotu"},
    {name:"🚀 Technologický růst", desc:"Rostou inovace"},
    {name:"😐 Stabilní rok", desc:"Nic zásadního"}
  ];
  return events[Math.floor(Math.random()*events.length)];
}

function getChange(type, event){
  if(event.name.includes("Recese")){
    if(type==='stocks') return -0.3;
    if(type==='crypto') return -0.5;
    if(type==='business') return -0.3;
    if(type==='real') return -0.1;
    if(type==='bonds') return 0.03;
    if(type==='safe') return 0.02;
  }
  if(event.name.includes("Boom")){
    if(type==='stocks') return 0.3;
    if(type==='crypto') return 0.6;
    if(type==='business') return 0.7;
    if(type==='real') return 0.1;
    if(type==='bonds') return 0.05;
    if(type==='safe') return 0.03;
  }
  if(event.name.includes("Inflace")){
    if(type==='safe') return -0.02;
    if(type==='bonds') return 0;
    if(type==='real') return 0.08;
    if(type==='stocks') return 0.05;
    if(type==='crypto') return Math.random()*0.4-0.2;
    if(type==='business') return Math.random()*0.2-0.1;
  }
  if(event.name.includes("Technologický")){
    if(type==='crypto') return 1.0;
    if(type==='stocks') return 0.2;
    if(type==='business') return 0.4;
    return 0.05;
  }
  if(event.name.includes("Stabilní")){
    if(type==='safe') return 0.03;
    if(type==='bonds') return 0.05;
    if(type==='real') return 0.08;
    if(type==='stocks') return 0.05;
    if(type==='crypto') return Math.random()*0.2-0.1;
    if(type==='business') return 0.05;
  }
}

function invest(type){
  if(year>5) return;

  let delay = (type==='real'||type==='business') ? 2 : (type==='stocks'||type==='bonds') ? 1 : 0;

  let event = randomEvent();
  let change = getChange(type, event);

  pending.push({amount: money, change: change, due: year+delay, type:type});

  money += 2000;

  let results = processPending();

  let logText = `<b>${event.name}</b><br>${event.desc}<br><br><b>Výsledky:</b><br>`;

  if(results.length===0){
    logText += "Žádné investice se tento rok nevyplatily<br>";
  } else {
    results.forEach(r=>{
      logText += `${r}<br>`;
    });
  }

  document.getElementById("log").innerHTML = logText;

  year++;
  update();
  renderPending();

  if(year>5) endGame();
}

function processPending(){
  let newPending=[];
  let results=[];

  pending.forEach(p=>{
    if(p.due===year){
      let result=Math.round(p.amount*(1+p.change));
      let diff=result-p.amount;
      money+=result;
      results.push(`${translate(p.type)}: ${diff>=0?'+':''}${diff} Kč`);
    } else newPending.push(p);
  });

  pending=newPending;
  return results;
}

function renderPending(){
  if(pending.length===0){
    document.getElementById("pendingBox").innerHTML = "";
    return;
  }

  let text = "<b>⏳ Čekající investice:</b><br>";
  pending.forEach(p=>{
    text += `${translate(p.type)} → za ${p.due - year} rok(y)<br>`;
  });

  document.getElementById("pendingBox").innerHTML = text;
}

function translate(type){
  return {
    safe:"Spoření",
    stocks:"Akcie",
    real:"Nemovitosti",
    crypto:"Krypto",
    business:"Podnikání",
    bonds:"Dluhopisy"
  }[type];
}

function update(){
  document.getElementById("money").innerText=money;
  document.getElementById("year").innerText=year;
}

function endGame(){
  document.getElementById("buttons").style.display = "none";

  let summary = `<br><br><b>🏁 KONEC HRY</b><br>Konečný majetek: ${money} Kč`;
  document.getElementById("log").innerHTML += summary;

  let scores=JSON.parse(localStorage.getItem("scores")||"[]");
  scores.push({name:player,money:money});
  scores.sort((a,b)=>b.money-a.money);
  localStorage.setItem("scores",JSON.stringify(scores));
  render();
}

function render(){
  let scores=JSON.parse(localStorage.getItem("scores")||"[]");
  let t=document.getElementById("leader");
  t.innerHTML="<tr><th>Jméno</th><th>Peníze</th></tr>";
  scores.slice(0,10).forEach(s=>{
    t.innerHTML+=`<tr><td>${s.name}</td><td>${s.money}</td></tr>`;
  });
}

render();
</script>

</body>
</html>
